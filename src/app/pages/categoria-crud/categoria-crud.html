<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
          <h4 class="mb-0">Cadastrar Novo Produto</h4>
        </div>
        
        <div class="card-body">
          <form [formGroup]="produtoForm" (ngSubmit)="salvarProduto()">
            
            <div class="mb-3">
              <label for="nome" class="form-label">Nome do Produto *</label>
              <input 
                type="text" 
                id="nome" 
                class="form-control" 
                [class.is-invalid]="produtoForm.get('nome')?.invalid && produtoForm.get('nome')?.touched"
                formControlName="nome" 
                placeholder="Ex: X-Burguer Duplo">
              <div class="invalid-feedback">O nome é obrigatório (mínimo de 3 letras).</div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="preco" class="form-label">Preço (R$) *</label>
                <input 
                  type="number" 
                  id="preco" 
                  class="form-control" 
                  [class.is-invalid]="produtoForm.get('preco')?.invalid && produtoForm.get('preco')?.touched"
                  formControlName="preco" 
                  placeholder="0.00">
                <div class="invalid-feedback">Insira um preço válido.</div>
              </div>

              <div class="col-md-6 mb-3">
                <label for="categoria" class="form-label">Categoria *</label>
                <select 
                  id="categoria" 
                  class="form-select" 
                  [class.is-invalid]="produtoForm.get('categoria')?.invalid && produtoForm.get('categoria')?.touched"
                  formControlName="categoria">
                  <option value="" disabled selected>Selecione...</option>
                  <option value="Lanches">Lanches</option>
                  <option value="Bebidas">Bebidas</option>
                  <option value="Sobremesas">Sobremesas</option>
                </select>
                <div class="invalid-feedback">Selecione uma categoria.</div>
              </div>
            </div>

            <div class="mb-4">
              <label for="descricao" class="form-label">Descrição</label>
              <textarea 
                id="descricao" 
                class="form-control" 
                formControlName="descricao" 
                rows="3" 
                placeholder="Ingredientes ou detalhes do produto..."></textarea>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <button type="button" class="btn btn-outline-secondary" (click)="produtoForm.reset()">Limpar</button>
              <button type="submit" class="btn btn-primary">Salvar Produto</button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
