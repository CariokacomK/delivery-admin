<div class="container mt-5">
  <div class="row">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
          <h5 class="mb-0">{{ editandoId ? 'Editar' : 'Cadastrar' }} Funcionário</h5>
        </div>
        <div class="card-body">
          <form [formGroup]="funcionarioForm" (ngSubmit)="salvar()">

            <div class="mb-3">
              <label class="form-label">Nome Completo *</label>
              <input type="text" class="form-control" formControlName="nome"
                [class.is-invalid]="funcionarioForm.get('nome')?.invalid && funcionarioForm.get('nome')?.touched">
            </div>

            <div class="mb-3">
              <label class="form-label">Cargo *</label>
              <select class="form-select" formControlName="cargo">
                <option value="" disabled>Selecione...</option>
                <option value="Atendente">Atendente</option>
                <option value="Entregador">Entregador</option>
                <option value="Cozinheiro">Cozinheiro</option>
                <option value="Gerente">Gerente</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">CPF *</label>
              <input type="text" class="form-control" formControlName="cpf" placeholder="000.000.000-00">
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">Salvar</button>
              <button *ngIf="editandoId" type="button" class="btn btn-light" (click)="cancelarEdicao()">Cancelar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Nome</th>
                <th>Cargo</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let f of funcionarios">
                <td>{{ f.nome }}</td>
                <td><span class="badge bg-secondary">{{ f.cargo }}</span></td>
                <td class="text-end">
                  <button class="btn btn-sm btn-outline-primary me-2" (click)="editar(f)">Editar</button>
                  <button class="btn btn-sm btn-outline-danger" (click)="excluir(f.id)">Excluir</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
