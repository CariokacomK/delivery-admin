<div class="container mt-4">

  <h2>Configurações da Loja</h2>
  <hr>

  <form [formGroup]="form">

    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">História da Loja</h5>
        <div class="mb-3">
          <label class="form-label">Descrição</label>
          <textarea class="form-control" formControlName="historia" rows="4"
            placeholder="Conte a história do restaurante..."></textarea>
        </div>
      </div>
    </div>

    <div class="card mb-4" formGroupName="endereco">
      <div class="card-body">
        <h5 class="card-title">Endereço</h5>

        <div class="mb-3">
          <label class="form-label">Rua</label>
          <input type="text" class="form-control" formControlName="rua" placeholder="Ex: Rua das Flores" />
        </div>

        <div class="row mb-3">
          <div class="col-6">
            <label class="form-label">Número</label>
            <input type="text" class="form-control" formControlName="numero" />
          </div>
          <div class="col-6">
            <label class="form-label">CEP</label>
            <input type="text" class="form-control" formControlName="cep" placeholder="00000-000" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-6">
            <label class="form-label">Bairro</label>
            <input type="text" class="form-control" formControlName="bairro" />
          </div>
          <div class="col-6">
            <label class="form-label">Cidade</label>
            <input type="text" class="form-control" formControlName="cidade" />
          </div>
        </div>

      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Taxa de Entrega</h5>
        <div class="mb-3">
          <label class="form-label">Valor (R$)</label>
          <input type="number" class="form-control" formControlName="taxaEntrega" min="0" />
        </div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Horários de Funcionamento</h5>

        <div formArrayName="horarios">
          <div
            *ngFor="let h of horarios.controls; let i = index"
            [formGroupName]="i"
            class="d-flex align-items-center gap-3 py-2 border-bottom">

            <span style="width: 80px">{{ diasSemana[i] }}</span>

            <mat-slide-toggle formControlName="aberto"></mat-slide-toggle>

            <input type="time" class="form-control form-control-sm"
              style="width: 120px" formControlName="abertura"
              [disabled]="!h.get('aberto')?.value" />

            <span>até</span>

            <input type="time" class="form-control form-control-sm"
              style="width: 120px" formControlName="fechamento"
              [disabled]="!h.get('aberto')?.value" />

          </div>
        </div>

      </div>
    </div>

    <button class="btn btn-warning fw-bold" (click)="salvar()">
      Salvar Configurações
    </button>

  </form>

</div>
