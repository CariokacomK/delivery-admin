<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Gestão de Cardápio</h2>
    <button class="btn btn-dark shadow-sm" (click)="cadastrarNovoProduto()">
      + Cadastrar Novo Produto
    </button>
  </div>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let cat of categorias">
      <div class="card shadow-sm h-100">

        <div class="card-header bg-dark text-white text-center">
          <h5 class="mb-0">{{ cat.nome }}</h5>
        </div>

        <div class="card-body text-center py-4">
          <div style="font-size: 4rem;" class="mb-3">
            {{ cat.icone }}
          </div>
          <p class="text-muted">Clique abaixo para gerenciar os itens desta categoria.</p>
          <button class="btn btn-outline-primary w-100">
            Ver Produtos
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
